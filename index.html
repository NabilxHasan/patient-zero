<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PATIENT ZERO 3D — a "Kickoff" GameJam entry</title>
  <style>
    :root { --mono: Consolas, "Courier New", monospace; }
    html, body { margin: 0; padding: 0; background: #05070c; height: 100%; overflow: hidden; color: #e5e7eb; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ---------- HUD ---------- */
    #hud { position: fixed; inset: 0; pointer-events: none; font-family: var(--mono); }
    .hidden { display: none !important; }

    #ticker {
      position: absolute; top: 0; left: 0; right: 0; height: 34px;
      background: rgba(5,7,10,0.9); display: flex; align-items: center; gap: 10px;
      padding: 0 14px; font-size: 14px; color: #d1d5db;
    }
    #ticker .live { color: #ff6b6b; font-weight: bold; }
    #ticker .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff3b3b; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    #meter { position: absolute; top: 46px; left: 16px; width: 280px; }
    #meter .label { font-size: 13px; color: #9ca3af; }
    #meter .bar { margin-top: 6px; height: 14px; background: #111827; border: 1px solid #374151; position: relative; }
    #meter .fill { height: 100%; width: 0%; background: #49ff8c; transition: width 0.2s; }
    #meter .pct { font-size: 14px; color: #6ee7a0; font-weight: bold; margin-top: 4px; }

    #vitals { position: absolute; left: 16px; bottom: 16px; }
    #vitals .cap { font-size: 11px; color: #6b7280; }
    #pips { display: flex; gap: 5px; margin: 5px 0; }
    #pips .pip { width: 15px; height: 15px; background: #1f2937; }
    #pips .pip.on { background: #49ff8c; }
    #lungeWrap { width: 120px; height: 7px; background: #111827; border: 1px solid #374151; }
    #lunge { height: 100%; width: 100%; background: #d8c877; }

    #stats { position: absolute; right: 16px; bottom: 18px; font-size: 13px; color: #9ca3af; }

    #stinger {
      position: absolute; left: 0; right: 0; top: 32%; text-align: center;
      font-size: 46px; font-weight: bold; color: #ff5b5b; opacity: 0;
      text-shadow: 0 0 24px #7a1a1a; transition: opacity 0.25s, transform 0.25s;
    }
    #intro {
      position: absolute; left: 0; right: 0; top: 42%; text-align: center; opacity: 0;
      transition: opacity 0.4s;
    }
    #intro .t { font-size: 30px; font-weight: bold; }
    #intro .s { font-size: 17px; color: #6ee7a0; font-style: italic; margin-top: 8px; }
    #flash { position: absolute; inset: 0; background: #ff2222; opacity: 0; }

    /* ---------- overlays ---------- */
    .screen {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      font-family: var(--mono); background: rgba(5,7,12,0.55); gap: 6px;
    }
    .screen h1 { font-size: 78px; margin: 0; color: #49ff8c; text-shadow: 0 0 30px #1a7a44; letter-spacing: 2px; }
    .screen h1.bad { color: #ff5b5b; text-shadow: 0 0 30px #7a1a1a; }
    .screen .tag { font-size: 22px; color: #9ca3af; font-style: italic; }
    .screen .sub { font-size: 15px; color: #6ee7a0; max-width: 680px; line-height: 1.7; margin-top: 10px; }
    .screen .keys { font-size: 14px; color: #6b7280; margin-top: 16px; }
    .btn {
      pointer-events: auto; cursor: pointer; font-family: var(--mono); font-size: 22px;
      color: #e5e7eb; background: none; border: none; margin-top: 10px;
    }
    .btn:hover { color: #49ff8c; }
    .pulse { animation: pulse 0.9s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .small { font-size: 13px; color: #4b5563; }

    #pause {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(4,6,12,0.82); z-index: 40; font-family: var(--mono); cursor: pointer; text-align: center;
    }
    #fatal {
      position: fixed; left: 0; right: 0; top: 0; z-index: 100; display: none;
      background: #7a1010; color: #ffd7d7; padding: 10px 14px; font-family: var(--mono);
      font-size: 13px; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud" class="hidden">
    <div id="ticker"><span class="dot"></span><span class="live">LIVE</span><span id="headline"></span></div>
    <div id="meter">
      <div class="label" id="districtName"></div>
      <div class="bar"><div class="fill" id="meterFill"></div></div>
      <div class="pct" id="meterPct">0% OVERRUN</div>
    </div>
    <div id="vitals">
      <div class="cap">VITALS</div>
      <div id="pips"></div>
      <div class="cap">LUNGE</div>
      <div id="lungeWrap"><div id="lunge"></div></div>
    </div>
    <div id="stats"></div>
    <div id="stinger"></div>
    <div id="intro"><div class="t"></div><div class="s"></div></div>
    <div id="flash"></div>
  </div>

  <div id="pause"><div><div style="color:#49ff8c;font-size:44px;font-weight:bold">PAUSED</div><div style="color:#9ca3af;margin-top:12px">tab lost focus — click or press any key to resume</div></div></div>
  <div id="fatal"></div>

  <script type="importmap">
    { "imports": { "three": "./lib/three/three.module.min.js" } }
  </script>
  <script src="src3d/audio.js"></script>
  <script type="module" src="src3d/main.js"></script>
</body>
</html>
